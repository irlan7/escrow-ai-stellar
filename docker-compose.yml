services:
  client:
    build:
      context: ./client
      args:
        VITE_AI_API_URL: https://${DOMAIN}
    ports:
      # Bind ke 127.0.0.1 saja — cuma nginx sistem yang perlu akses,
      # tidak diekspos langsung ke internet.
      - "127.0.0.1:8095:80"
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "127.0.0.1:8096:3001"
    environment:
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-gpt-oss-120b}
      - PORT=3001
      - DATA_DIR=/app/data
    volumes:
      # Data analytics & feedback disimpan di volume terpisah supaya
      # tidak hilang saat container di-rebuild/redeploy.
      - server_data:/app/data
    restart: unless-stopped

volumes:
  server_data:


